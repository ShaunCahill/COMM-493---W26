<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regression Model Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Housing Price Predictor</h1>
        <p>Enter the feature data (comma-separated values) below to get a prediction.</p>

        <div class="input-group">
            <label for="dataInput">Feature Vector:</label>
            <textarea id="dataInput" rows="6" placeholder="Paste your CSV data here (e.g., 20.0, 141.0, 31770.0...)"></textarea>
        </div>

        <button id="predictBtn" onclick="makePrediction()">Get Prediction</button>

        <div id="resultContainer" class="hidden">
            <h2>Prediction Result:</h2>
            <p id="predictionOutput">--</p>
        </div>

        <div id="errorContainer" class="hidden">
            <p id="errorMessage"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
